name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + lint + 352 SSG pages)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test (real browser, full wizard flow)
        run: |
          npm start -- -p 3100 &
          npx wait-on -t 30000 http://localhost:3100
          node scripts/smoke.mjs
