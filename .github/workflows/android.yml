name: Android APK

# Builds a real, installable debug APK from the one codebase and uploads it as
# a downloadable artifact — no local Android Studio needed. Runs on demand and
# on pushes that touch the app or the native/build config.
on:
  workflow_dispatch:
  push:
    branches: [main, "claude/**"]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "data/**"
      - "public/**"
      - "android/**"
      - "capacitor.config.ts"
      - "next.config.mjs"
      - "scripts/mobile-build.mjs"
      - "package.json"
      - ".github/workflows/android.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (platform 36 + build-tools 36)
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build static export + sync into native projects
        run: npm run mobile:build

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: trippa-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
